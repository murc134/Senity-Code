# ================================================================
# Senity Color Theme — Zentrale Farb-Konfiguration
# Generiert von build-theme-conf.py
#
# Wird verwendet von:
#   - patch-claude-header.js   (ersetzt Anthropic-Farben im CLI-Bundle)
#   - docker-entrypoint.sh     (Banner-Farben)
#
# Aenderungen benoetigen einen Image-Rebuild: ./claude-senity.sh --rebuild
# ================================================================

# PRIMARY — Haupt-Akzent (claude Token — Titel, Spinner, Prompts)
PRIMARY_256=93
PRIMARY_HEX="#5900ff"
PRIMARY_RGB="89;0;255"

# SECONDARY — Shimmer/Highlight (claudeShimmer Token)
SECONDARY_256=135
SECONDARY_HEX="#9c38ff"
SECONDARY_RGB="156;56;255"

# ACCENT — Deep Orange (bashBorder, Banner-Glow)
ACCENT_256=199
ACCENT_HEX="#ff00af"
ACCENT_RGB="255;0;175"

# LINK — Terminal-Hyperlinks (OSC-8 Datei-/Ordner-/Weblinks)
LINK_256=201
LINK_HEX="#fb00ff"
LINK_RGB="251;0;255"

# MASCOT — Senity-Head-Konstellation im kompakten Startheader
# (senity-mascot-filter, Ticket #2435). Markenfarben aus dem Logo:
# Blau #33378C, Pink #E5007E, Violett #694C99.
MASCOT_BLUE_RGB="51;55;140"
MASCOT_PINK_RGB="229;0;126"
MASCOT_PURPLE_RGB="105;76;153"
