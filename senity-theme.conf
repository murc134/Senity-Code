# ════════════════════════════════════════════════════════════════
# Senity Color Theme — Zentrale Farb-Konfiguration
#
# Wird verwendet von:
#   - patch-claude-header.js   (ersetzt Anthropic-Orange im CLI-Bundle)
#   - docker-entrypoint.sh     (Banner-Farben)
#
# Format: KEY=VALUE, Hex/RGB in Anfuehrungszeichen (bash-source-safe).
# Aenderungen an diesem File benoetigen einen Image-Rebuild:
#   ./claude-senity.sh --rebuild
#   .\claude-senity.bat --rebuild
# ════════════════════════════════════════════════════════════════

# PRIMARY — dunkles Senity-Lila (Haupt-Akzent, Logo-Body)
PRIMARY_256=99
PRIMARY_HEX="#875FAF"
PRIMARY_RGB="135;95;175"

# SECONDARY — helles Senity-Lila (Highlights, Sekundaer-Akzent)
SECONDARY_256=141
SECONDARY_HEX="#AF87FF"
SECONDARY_RGB="175;135;255"

# ACCENT — Pink-Glow (Brain-Glow, Akzentpunkte)
ACCENT_256=199
ACCENT_HEX="#FF00AF"
ACCENT_RGB="255;0;175"
